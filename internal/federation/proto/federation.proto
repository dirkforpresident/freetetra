syntax = "proto3";

package freetetra.federation.v1;

option go_package = "github.com/freetetra/server/internal/federation/federationpb;federationpb";

message Envelope {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_JSON = 1;
    KIND_BINARY = 2;
  }

  Kind kind = 1;
  bytes payload = 2;
}

service FederationTransport {
  rpc Connect(stream Envelope) returns (stream Envelope);
}
