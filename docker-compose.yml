services:
  freetetra:
    build: .
    container_name: freetetra
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  webradio:
    build: .
    container_name: freetetra-webradio
    entrypoint: ["/app/tetra-brew-webradio"]
    env_file:
      - .env
    environment:
      BREW_MODE: webradio
      BREW_CLIENT_BASE_URL: http://freetetra:8080
      WEBRADIO_ENABLED: "true"
      WEBRADIO_STREAM_URL: "https://st01.sslstream.dlf.de/dlf/01/128/mp3/stream.mp3"
      WEBRADIO_TALKGROUP: "887"
      WEBRADIO_SOURCE_ISSI: "900001"
      WEBRADIO_ENCODER_BIN: /app/tetra-acelp-stdio
    depends_on:
      - freetetra
    restart: unless-stopped

  echo:
    build: .
    container_name: freetetra-echo
    entrypoint: ["/app/tetra-brew-echo"]
    env_file:
      - .env
    environment:
      BREW_MODE: echo
      BREW_CLIENT_BASE_URL: http://freetetra:8080
      ECHO_TALKGROUP: "10002"
      ECHO_SOURCE_ISSI: "899002"
      ECHO_PLAYBACK_DELAY: "300ms"
    depends_on:
      - freetetra
    restart: unless-stopped
