services:
  freetetra:
    build: .
    image: freetetra:latest
    container_name: freetetra
    env_file:
      - ${ENV_COMMON_FILE:-.env}
      - ${ENV_FREETETRA_FILE:-.env}
    ports:
      - "8101:8101"
      - "8102:8102"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  webradio:
    build: .  
    image: freetetra:latest
    container_name: freetetra-webradio
    entrypoint: ["/app/tetra-brew-webradio"]
    env_file:
      - ${ENV_COMMON_FILE:-.env}
      - ${ENV_WEBRADIO_FILE:-.env}
    environment:
      BREW_MODE: webradio
      BREW_CLIENT_BASE_URL: http://freetetra:8101
      BREW_CLIENT_USERNAME: "2635717"
      BREW_CLIENT_PASSWORD: "blafablafa"
      WEBRADIO_ENABLED: "true"
      WEBRADIO_STREAM_URL: "https://st01.sslstream.dlf.de/dlf/01/128/mp3/stream.mp3"
      WEBRADIO_TALKGROUP: "10"
      WEBRADIO_SOURCE_ISSI: "123"
      WEBRADIO_ENCODER_BIN: /app/tetra-acelp-stdio
      WEBRADIO_RECONNECT_DELAY: "5s"
    depends_on:
      - freetetra
    restart: unless-stopped

  echo:
    build: .
    image: freetetra:latest
    container_name: freetetra-echo
    entrypoint: ["/app/tetra-brew-echo"]
    env_file:
      - ${ENV_COMMON_FILE:-.env}
      - ${ENV_ECHO_FILE:-.env}
    environment:
      BREW_MODE: echo
      BREW_CLIENT_BASE_URL: http://freetetra:8101
      BREW_CLIENT_USERNAME: "2635720"
      BREW_CLIENT_PASSWORD: "blafablafa"
      ECHO_TALKGROUP: "10002"
      ECHO_SOURCE_ISSI: "899002"
      ECHO_PLAYBACK_DELAY: "300ms"
    depends_on:
      - freetetra
    restart: unless-stopped

  # Optional DMR/BrandMeister bridge for TG 91+. Disabled unless an env file
  # (typically .env.dmrbridge) provides DMRBRIDGE_BM_USER + DMRBRIDGE_BM_PASS.
  # Start with: docker compose --profile dmrbridge up -d dmrbridge
  #
  # Gate: only source ISSIs that exist in the local RadioID users.txt may
  # transmit into BrandMeister. Everyone else stays listen-only on TG 91+.
  # Disable the gate with DMRBRIDGE_REQUIRE_RADIOID=false in the env file.
  dmrbridge:
    build: .
    image: freetetra:latest
    container_name: freetetra-dmrbridge
    entrypoint: ["/app/tetra-brew-dmrbridge"]
    profiles: ["dmrbridge"]
    env_file:
      - ${ENV_COMMON_FILE:-.env}
      - ${ENV_DMRBRIDGE_FILE:-.env.dmrbridge}
    environment:
      DMRBRIDGE_FT_BASE_URL: http://freetetra:8101
      DMRBRIDGE_BM_BASE_URL: https://core.tetrapack.online:443
      DMRBRIDGE_TGS: "91,262,2621,2622,9990"
      DMRBRIDGE_REQUIRE_RADIOID: "true"
      RADIOID_USERS_FILE: /app/data/users.txt
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - freetetra
    restart: unless-stopped
