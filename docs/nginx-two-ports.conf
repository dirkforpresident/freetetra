# NGINX single-public-port setup for FreeTetra
#
# Public forwarding expected:
# - free.tetra.cat -> this machine:80
# - free2.tetra.cat -> this machine:80
#
# Main instance runs on local ports 8101 (HTTP/WS) and 8102 (gRPC)
# Loopback test instance runs on local ports 8201 (HTTP/WS) and 8202 (gRPC)

upstream freetetra_main {
  server 127.0.0.1:8101;
}

upstream freetetra_main_grpc {
  server 127.0.0.1:8102;
}

upstream freetetra_loopback {
  server 127.0.0.1:8201;
}

upstream freetetra_loopback_grpc {
  server 127.0.0.1:8202;
}

server {
  listen 80;
  server_name free.tetra.cat;

  location = /freetetra.federation.v2.FederationTransportV2/Connect {
    grpc_pass grpc://freetetra_main_grpc;
    grpc_read_timeout 3600s;
    grpc_send_timeout 3600s;
    # Long-lived bidi gRPC stream — cumulative request body grows over time.
    # Default nginx limit (1m) terminates the stream with RST_STREAM after
    # ~1MB of traffic, causing the federation reconnect loop.
    client_max_body_size 0;
  }

  location / {
    proxy_pass http://freetetra_main;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Brew binary WebSocket transport
  location ^~ /brew/ws/ {
    proxy_pass http://freetetra_main;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}

server {
  listen 80;
  server_name free2.tetra.cat;

  location = /freetetra.federation.v2.FederationTransportV2/Connect {
    grpc_pass grpc://freetetra_loopback_grpc;
    grpc_read_timeout 3600s;
    grpc_send_timeout 3600s;
    client_max_body_size 0;
  }

  location / {
    proxy_pass http://freetetra_loopback;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Brew binary WebSocket transport
  location ^~ /brew/ws/ {
    proxy_pass http://freetetra_loopback;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
