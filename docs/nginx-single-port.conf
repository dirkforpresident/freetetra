# NGINX single-port setup for FreeTetra
#
# Public routing model:
# - http://free.tetra.cat:80  -> main instance
# - http://free2.tetra.cat:80 -> loopback test instance
#
# Each backend uses one internal listener where HTTP pages/APIs and federation
# gRPC are multiplexed by FreeTetra itself (FEDERATION_RPC_LISTEN_ADDR matches
# HTTP_LISTEN_ADDR).
#
# Main backend local port:    8091
# Loopback backend local port: 8092

upstream freetetra_main_http {
  server 127.0.0.1:8091;
}

upstream freetetra_main_grpc {
  server 127.0.0.1:8091;
}

upstream freetetra_loopback_http {
  server 127.0.0.1:8092;
}

upstream freetetra_loopback_grpc {
  server 127.0.0.1:8092;
}

# gRPC method path generated from federation_v2_draft.proto
# /freetetra.federation.v2.FederationTransportV2/Connect

server {
  listen 80;
  server_name free.tetra.cat;

  # Federation gRPC stream
  location = /freetetra.federation.v2.FederationTransportV2/Connect {
    grpc_pass grpc://freetetra_main_grpc;
    grpc_read_timeout 3600s;
    grpc_send_timeout 3600s;
    # Long-lived bidi gRPC stream — cumulative request body grows over time.
    # Default nginx limit (1m) terminates the stream with RST_STREAM after
    # ~1MB of traffic, causing the federation reconnect loop.
    client_max_body_size 0;
  }

  # Normal HTTP pages/APIs/Brew discovery
  location / {
    proxy_pass http://freetetra_main_http;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name free2.tetra.cat;

  # Federation gRPC stream
  location = /freetetra.federation.v2.FederationTransportV2/Connect {
    grpc_pass grpc://freetetra_loopback_grpc;
    grpc_read_timeout 3600s;
    grpc_send_timeout 3600s;
    client_max_body_size 0;
  }

  # Normal HTTP pages/APIs/Brew discovery
  location / {
    proxy_pass http://freetetra_loopback_http;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
