# NGINX gRPC Federation Setup
#
# This configuration handles both HTTP and HTTPS with proper gRPC passthrough.
# FreeTetra backend listens on port 8091 (HTTP/2 h2c) with both:
# - Brew protocol (HTTP pages, WebSocket discovery)
# - Federation gRPC (multiplexed on same port)
#
# Public URLs:
# - http://free.tetra.cat   -> HTTP access (port 80)
# - https://free.tetra.cat  -> HTTPS with TLS termination (port 443)
#
# Backend: localhost:8091 (h2c)

upstream freetetra_backend {
  server 127.0.0.1:8091;
}

# HTTP server - redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name free.tetra.cat;

  # Redirect all HTTP to HTTPS
  location / {
    return 301 https://$server_name$request_uri;
  }
}

# HTTPS server with gRPC support
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name free.tetra.cat;

  # TLS certificates (adjust paths to your certs)
  ssl_certificate /etc/letsencrypt/live/free.tetra.cat/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/free.tetra.cat/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # Federation gRPC endpoint
  location = /freetetra.federation.v2.FederationTransportV2/Connect {
    grpc_pass grpc://freetetra_backend;
    grpc_read_timeout 3600s;
    grpc_send_timeout 3600s;
    # Long-lived bidi gRPC stream — cumulative request body grows over time.
    # Default nginx limit (1m) terminates the stream with RST_STREAM after
    # ~1MB of traffic, causing the federation reconnect loop.
    client_max_body_size 0;
  }

  # Brew HTTP/WebSocket pages and APIs
  location / {
    proxy_pass http://freetetra_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }
}
